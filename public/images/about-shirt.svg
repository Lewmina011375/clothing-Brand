<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-label="Pandora t-shirt banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f3f4f6"/>
    </linearGradient>
    <radialGradient id="glow" cx="35%" cy="25%" r="70%">
      <stop offset="0" stop-color="#000000" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="800" rx="56" fill="url(#bg)"/>
  <rect width="1200" height="800" rx="56" fill="url(#glow)"/>

  <!-- simplified tee -->
  <g transform="translate(360 140)">
    <path d="M120 40c40-26 80-40 120-40s80 14 120 40l86 54-52 110-74-32v352c0 44-36 80-80 80H240c-44 0-80-36-80-80V172l-74 32-52-110 86-54Z"
          fill="#111827" fill-opacity="0.92"/>
    <path d="M240 104c40-24 80-24 120 0" fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="8"/>
    <text x="300" y="330" text-anchor="middle"
          font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial"
          font-size="20" font-weight="800" letter-spacing="6" fill="#ffffff" opacity="0.55">PANDORA</text>
    <text x="300" y="360" text-anchor="middle"
          font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial"
          font-size="12" font-weight="700" letter-spacing="4" fill="#ffffff" opacity="0.45">ESSENTIAL TEE</text>
  </g>

  <!-- caption -->
  <g transform="translate(72 94)">
    <text x="0" y="0" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial"
          font-size="14" font-weight="900" letter-spacing="5" fill="#6b7280">ABOUT</text>
    <text x="0" y="44" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial"
          font-size="44" font-weight="900" fill="#111827">Pandora Clothing</text>
  </g>
</svg>
