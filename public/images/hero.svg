<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-label="Pandora hero image">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0b12"/>
      <stop offset="0.55" stop-color="#111827"/>
      <stop offset="1" stop-color="#050509"/>
    </linearGradient>
    <radialGradient id="glow" cx="70%" cy="30%" r="70%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="lines" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M0 47.5H48" stroke="#ffffff" stroke-opacity="0.06"/>
    </pattern>
  </defs>

  <rect width="1200" height="900" fill="url(#bg)"/>
  <rect width="1200" height="900" fill="url(#lines)" opacity="0.7"/>
  <rect width="1200" height="900" fill="url(#glow)"/>

  <!-- Abstract model silhouette -->
  <g transform="translate(720 120)">
    <path d="M160 40c70 0 120 48 120 120v110c0 52-18 98-52 134l-40 42c-28 30-64 46-108 46s-80-16-108-46l-40-42c-34-36-52-82-52-134V160C-120 88-70 40 0 40h160Z"
          fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>
    <path d="M-40 210c38-26 92-38 160-38s122 12 160 38" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="3"/>
    <path d="M-52 318c52-30 120-45 212-45s160 15 212 45" fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="3"/>
  </g>

  <!-- Brand mark -->
  <g transform="translate(72 92)">
    <circle cx="34" cy="34" r="34" fill="#ffffff"/>
    <text x="34" y="44" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="28" font-weight="700" fill="#000000">P</text>
    <text x="92" y="44" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="26" font-weight="700" letter-spacing="10" fill="#ffffff">PANDORA</text>
    <text x="92" y="74" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="12" font-weight="600" letter-spacing="4" fill="#cbd5e1">STREETWEAR " ESSENTIALS</text>
  </g>

  <!-- Product hint cards -->
  <g transform="translate(72 640)">
    <rect x="0" y="0" width="360" height="160" rx="28" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="28" y="52" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="12" font-weight="700" letter-spacing="3" fill="#cbd5e1">NEW DROP</text>
    <text x="28" y="94" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="26" font-weight="700" fill="#ffffff">Hoodies</text>
    <text x="28" y="124" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="14" fill="#94a3b8">Minimal cuts, premium fabric.</text>

    <rect x="396" y="0" width="360" height="160" rx="28" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="424" y="52" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="12" font-weight="700" letter-spacing="3" fill="#cbd5e1">FEATURED</text>
    <text x="424" y="94" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="26" font-weight="700" fill="#ffffff">Jackets</text>
    <text x="424" y="124" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="14" fill="#94a3b8">Layer up with clean lines.</text>
  </g>
</svg>
